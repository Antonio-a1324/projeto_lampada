<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel IOT Premium - SENAI</title>
    <link rel="icon" type="image/png" href="senai-logo.png">
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <div class="header">
        <img src="senai-logo.png" class="logo">
        <h1>Gerenciamento de Lâmpadas IOT</h1>
        <button class="btn-tema" onclick="toggleTema()" id="btnTema">🌙 Modo Escuro</button>
    </div>

    <div class="controle-geral">
        <div class="card geral">
            <h2>CONTROLE GERAL</h2>
            <button class="btn-primario" onclick="ligarTodasLampadas()">🔆 Ligar Todas</button>
            <button class="btn-perigo" onclick="desligarTodasLampadas()">🌑 Desligar Todas</button>
        </div>

        <div class="card perigo">
            <h2>MODO LADRÃO</h2>
            <button class="btn-alerta" onclick="modo_ladrao()">🚨 Ativar Alarme</button>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <h2>Sala</h2>
            <div id="lp-sala" class="lampada">💡</div>
            <div class="botoes-card">
                <button onclick="ligarLampadaSala()">Ligar</button>
                <button onclick="desligarLampadaSala()">Desligar</button>
            </div>
        </div>

        <div class="card">
            <h2>Cozinha</h2>
            <div id="lp-cozinha" class="lampada">💡</div>
            <div class="botoes-card">
                <button onclick="ligarLampadaCozinha()">Ligar</button>
                <button onclick="desligarLampadaCozinha()">Desligar</button>
            </div>
        </div>

        <div class="card">
            <h2>Quarto 1</h2>
            <div id="lp-quarto1" class="lampada">💡</div>
            <div class="botoes-card">
                <button onclick="ligarLampadaQuarto1()">Ligar</button>
                <button onclick="desligarLampadaQuarto1()">Desligar</button>
            </div>
        </div>

        <div class="card">
            <h2>Quarto 2</h2>
            <div id="lp-quarto2" class="lampada">💡</div>
            <div class="botoes-card">
                <button onclick="ligarLampadaQuarto2()">Ligar</button>
                <button onclick="desligarLampadaQuarto2()">Desligar</button>
            </div>
        </div>
    </div>

    <script src="mqttws31.js"></script>
    <script src="index.js"></script>
</body>
</html>
